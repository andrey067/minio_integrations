name: minio_dotnet
services:
    minio:
        ports:
            - 9000:9000
            - 9001:9001
        container_name: minio1
        volumes:
            - minio:/data  # Mapeia o volume existente "minio" para "/data" no container
        environment:
            - MINIO_ROOT_USER=ROOTUSER
            - MINIO_ROOT_PASSWORD=CHANGEME123
        image: quay.io/minio/minio
        command: server /data --console-address ":9001"

volumes:
    minio:
        external: true
